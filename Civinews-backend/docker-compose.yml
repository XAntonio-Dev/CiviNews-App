services:
  db:
    image: postgres:15-alpine
    container_name: civinews_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: civinews
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    image: python:3.11-slim
    container_name: civinews_api
    restart: always
    working_dir: /app
    volumes:
      - .:/app
    # Exponemos el puerto de FastAPI al exterior
    ports:
      - "8000:8000"
    # Instalamos las librerías al vuelo y arrancamos con recarga automática (--reload)
    command: >
      bash -c "pip install fastapi uvicorn sqlalchemy psycopg2-binary python-jose[cryptography] bcrypt email-validator pydantic-settings && 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db

volumes:
  postgres_data:
